name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @caratflow/shared-types build
      - run: pnpm --filter @caratflow/utils build
      - run: pnpm --filter @caratflow/api exec tsc --noEmit
      - run: pnpm --filter @caratflow/web exec tsc --noEmit

  test-utils:
    name: Test Utils
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @caratflow/shared-types build
      - run: pnpm --filter @caratflow/utils test -- --coverage

      - name: Upload utils coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-utils
          path: packages/utils/coverage/
          retention-days: 14

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: caratflow_root
          MYSQL_DATABASE: caratflow_test
          MYSQL_USER: caratflow
          MYSQL_PASSWORD: caratflow_pass
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql://caratflow:caratflow_pass@localhost:3306/caratflow_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @caratflow/shared-types build
      - run: pnpm --filter @caratflow/utils build
      - run: pnpm --filter @caratflow/api test -- --coverage

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 14

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-utils, test-api]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: coverage-utils
          path: packages/utils/coverage/

      - uses: actions/download-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage/

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Generate coverage summary
        run: npx tsx tools/coverage-report.ts

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-utils, test-api]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build
